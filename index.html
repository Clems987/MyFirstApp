<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
        }
        h1 {
            margin-bottom: 30px;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .score-board {
            display: flex;
            gap: 30px;
            margin-bottom: 15px;
            font-size: 1.2rem;
            background: #0f3460;
            padding: 15px 30px;
            border-radius: 25px;
        }
        .difficulty {
            margin-bottom: 20px;
        }
        .difficulty select {
            padding: 8px 15px;
            font-size: 1rem;
            border-radius: 15px;
            border: none;
            background: #0f3460;
            color: white;
            cursor: pointer;
        }
        .status {
            margin-bottom: 20px;
            font-size: 1.5rem;
            min-height: 40px;
        }
        .board {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            grid-template-rows: repeat(3, 100px);
            gap: 10px;
            background: #0f3460;
            padding: 10px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }
        .cell {
            width: 100px;
            height: 100px;
            background: #1a1a2e;
            border: none;
            border-radius: 10px;
            font-size: 3rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .cell:hover:not(.taken) {
            background: #e94560;
            transform: scale(1.05);
        }
        .cell.x {
            color: #00d9ff;
        }
        .cell.o {
            color: #ff6b6b;
        }
        .cell.winner {
            background: #00ff88;
            color: #1a1a2e;
        }
        .reset-btn {
            margin-top: 30px;
            padding: 15px 40px;
            font-size: 1.2rem;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 5px 15px rgba(233,69,96,0.4);
        }
        .reset-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(233,69,96,0.6);
        }
    </style>
</head>
<body>
    <h1>Tic Tac Toe</h1>
    <div class="score-board">
        <span>You: <strong id="playerScore">0</strong></span>
        <span>Draw: <strong id="drawScore">0</strong></span>
        <span>Computer: <strong id="computerScore">0</strong></span>
    </div>
    <div class="difficulty">
        <label>Difficulty: </label>
        <select id="difficulty">
            <option value="easy">Easy</option>
            <option value="medium" selected>Medium</option>
            <option value="hard">Hard</option>
        </select>
    </div>
    <div class="status" id="status">Your turn (X)</div>
    <div class="board" id="board">
        <button class="cell" data-index="0"></button>
        <button class="cell" data-index="1"></button>
        <button class="cell" data-index="2"></button>
        <button class="cell" data-index="3"></button>
        <button class="cell" data-index="4"></button>
        <button class="cell" data-index="5"></button>
        <button class="cell" data-index="6"></button>
        <button class="cell" data-index="7"></button>
        <button class="cell" data-index="8"></button>
    </div>
    <button class="reset-btn" id="resetBtn">New Game (resets score)</button>

<script>
        const cells = document.querySelectorAll('.cell');
        const statusEl = document.getElementById('status');
        const resetBtn = document.getElementById('resetBtn');
        const playerScoreEl = document.getElementById('playerScore');
        const computerScoreEl = document.getElementById('computerScore');
        const drawScoreEl = document.getElementById('drawScore');
        
        let scores = { player: 0, computer: 0, draw: 0 };
        let board = Array(9).fill('');
        let gameActive = true;
        const player = 'X';
        const computer = 'O';
        let difficulty = 'medium';
        
        const winningCombos = [
            [0,1,2], [3,4,5], [6,7,8],
            [0,3,6], [1,4,7], [2,5,8],
            [0,4,8], [2,4,6]
        ];
        
        function checkWinner() {
            for (let combo of winningCombos) {
                const [a, b, c] = combo;
                if (board[a] && board[a] === board[b] && board[a] === board[c]) {
                    return { winner: board[a], combo };
                }
            }
            if (board.every(cell => cell !== '')) return { winner: 'draw' };
            return null;
        }
        
        function getAvailableMoves() {
            return board.map((v, i) => v === '' ? i : -1).filter(i => i !== -1);
        }
        
        function findWinningMove(symbol) {
            for (let combo of winningCombos) {
                const [a, b, c] = combo;
                const line = [board[a], board[b], board[c]];
                const count = line.filter(s => s === symbol).length;
                const empty = line.filter(s => s === '').length;
                if (count === 2 && empty === 1) {
                    if (board[a] === '') return a;
                    if (board[b] === '') return b;
                    if (board[c] === '') return c;
                }
            }
            return -1;
        }
        
        function minimax(b, depth, isMaximizing) {
            const result = checkWinnerForMinimax(b);
            if (result) {
                if (result.winner === computer) return 10 - depth;
                if (result.winner === player) return depth - 10;
                return 0;
            }
            
            const available = b.map((v, i) => v === '' ? i : -1).filter(i => i !== -1);
            if (available.length === 0) return 0;
            
            if (isMaximizing) {
                let best = -Infinity;
                for (let move of available) {
                    b[move] = computer;
                    best = Math.max(best, minimax(b, depth + 1, false));
                    b[move] = '';
                    if (best >= 10) return best;
                }
                return best;
            } else {
                let best = Infinity;
                for (let move of available) {
                    b[move] = player;
                    best = Math.min(best, minimax(b, depth + 1, true));
                    b[move] = '';
                    if (best <= -10) return best;
                }
                return best;
            }
        }
        
        function checkWinnerForMinimax(b) {
            for (let combo of winningCombos) {
                const [a, b_, c] = combo;
                if (b[a] && b[a] === b[b_] && b[a] === b[c]) {
                    return { winner: b[a] };
                }
            }
            if (b.every(cell => cell !== '')) return { winner: 'draw' };
            return null;
        }
        
        function getBestMove() {
            const available = board.map((v, i) => v === '' ? i : -1).filter(i => i !== -1);
            let bestScore = -Infinity;
            let bestMove = available[0];
            
            for (let move of available) {
                board[move] = computer;
                const score = minimax(board, 0, false);
                board[move] = '';
                if (score > bestScore) {
                    bestScore = score;
                    bestMove = move;
                }
            }
            return bestMove;
        }
        
        function computerMove() {
            const available = getAvailableMoves();
            
            if (difficulty === 'easy') {
                if (Math.random() < 0.3) return available[Math.floor(Math.random() * available.length)];
                let move = findWinningMove(computer);
                if (move !== -1) return move;
                return available[Math.floor(Math.random() * available.length)];
            }
            
            if (difficulty === 'hard') {
                return getBestMove();
            }
            
            let move = findWinningMove(computer);
            if (move !== -1) return move;
            
            move = findWinningMove(player);
            if (move !== -1) return move;
            
            if (available.length === 9) return 4;
            
            return available[Math.floor(Math.random() * available.length)];
        }
        
        function makeMove(index, symbol) {
            board[index] = symbol;
            cells[index].textContent = symbol;
            cells[index].classList.add(symbol.toLowerCase(), 'taken');
        }
        
        function handleClick(e) {
            const cell = e.target;
            const index = parseInt(cell.dataset.index);
            
            if (board[index] || !gameActive) return;
            
            makeMove(index, player);
            
            let result = checkWinner();
            if (result) {
                endGame(result);
                return;
            }
            
            statusEl.textContent = "Computer is thinking...";
            gameActive = false;
            
            setTimeout(() => {
                const compMove = computerMove();
                makeMove(compMove, computer);
                result = checkWinner();
                if (result) {
                    endGame(result);
                } else {
                    gameActive = true;
                    statusEl.textContent = "Your turn (X)";
                }
            }, 500);
        }
        
        function endGame(result) {
            gameActive = false;
            if (result.winner === 'draw') {
                statusEl.textContent = "It's a draw!";
                scores.draw++;
                drawScoreEl.textContent = scores.draw;
            } else if (result.winner === player) {
                statusEl.textContent = "You win!";
                scores.player++;
                playerScoreEl.textContent = scores.player;
                result.combo.forEach(i => cells[i].classList.add('winner'));
            } else {
                statusEl.textContent = "Computer wins!";
                scores.computer++;
                computerScoreEl.textContent = scores.computer;
                result.combo.forEach(i => cells[i].classList.add('winner'));
            }
            
            setTimeout(() => {
                resetGame();
            }, 1000);
        }
        
        function resetGame() {
            board = Array(9).fill('');
            gameActive = true;
            statusEl.textContent = "Your turn (X)";
            cells.forEach(cell => {
                cell.textContent = '';
                cell.className = 'cell';
            });
        }
        
        function resetScores() {
            scores = { player: 0, computer: 0, draw: 0 };
            playerScoreEl.textContent = 0;
            computerScoreEl.textContent = 0;
            drawScoreEl.textContent = 0;
            resetGame();
        }
        
        document.getElementById('difficulty').addEventListener('change', function(e) {
            difficulty = e.target.value;
        });
        
        cells.forEach(cell => cell.addEventListener('click', handleClick));
        resetBtn.addEventListener('click', resetScores);
    </script>
</body>
</html>
